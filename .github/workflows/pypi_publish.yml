name: Build and Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Debug mode (builds only one Python version to save time)'
        required: false
        default: 'false'

jobs:
  build_wheels:
    name: Build ${{ matrix.backend }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Linux CPU
          - os: ubuntu-latest
            backend: cpu
          # 2. Linux CUDA
          - os: ubuntu-latest
            backend: cuda
          # 3. Windows CPU
          - os: windows-latest
            backend: cpu
          # 4. Windows CUDA
          - os: windows-latest
            backend: cuda
          # 5. macOS Metal (macOS supports Metal by default)
          - os: macos-latest
            backend: metal

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by setuptools_scm to retrieve git history for versioning
          submodules: recursive

      # Specific setup for Windows CUDA
      - name: Install CUDA (Windows)
        if: matrix.os == 'windows-latest' && matrix.backend == 'cuda'
        uses: jimver/cuda-toolkit@v0.2.20
        with:
          cuda: '11.8.0'
          method: 'network'

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # 1. Pass the backend type to setup.py
          # 2. Pass the version: use git tag if available, otherwise fallback to dev version
          CIBW_ENVIRONMENT: >
            RS_BACKEND=${{ matrix.backend }}
            RAPIDSPEECH_IS_FOR_PYPI=1
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ startsWith(github.ref_name, 'v') && github.ref_name || '0.0.0.dev0' }}

          # Use a manylinux image with CUDA 11.8 layered on top for the cuda build.
          # The raw nvidia/cuda image lacks the /opt/python/cpXX-cpXX interpreters
          # that cibuildwheel requires; sameli/manylinux2014_x86_64_cuda_11.8 ships
          # both manylinux2014 + CUDA toolkit (nvcc, libs).
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.backend == 'cuda' && 'sameli/manylinux2014_x86_64_cuda_11.8' || 'manylinux2014' }}

          # Debug tip: build only for Python 3.9 in debug mode to save time
          CIBW_BUILD: ${{ github.event.inputs.debug_mode == 'true' && 'cp39-*' || '*' }}

          # Only build 64-bit wheels. 32-bit (i686) is not realistic for a speech/ML
          # library, and the manylinux2014_i686 image ships a pip-cmake binary that
          # is dynamically linked against libatomic.so.1 (not present in the image)
          # and has no patchelf available via yum — both block the build.
          CIBW_ARCHS_LINUX: x86_64
          # macos-latest is arm64-only; build arm64 wheels (Metal backend).
          CIBW_ARCHS_MACOS: arm64

          # Install build dependencies (patchelf on Linux fixes ggml NEEDED entries)
          CIBW_BEFORE_BUILD: >
            pip install pybind11 numpy cmake &&
            (command -v yum >/dev/null 2>&1 && yum install -y patchelf zip unzip || true)

          # Skip legacy Python versions, PyPy, and musllinux (not needed for end users).
          # cp38 is dropped because Python 3.8 reached EOL in Oct 2024 and the
          # sameli/manylinux2014_x86_64_cuda_11.8 image no longer ships a cp38 interpreter.
          CIBW_SKIP: cp36-* cp37-* cp38-* pp* *-musllinux_*

          # Fix NEEDED entries before auditwheel repair on Linux.
          # cmake embeds build-tree paths like "ggml/src/libggml-base.so"
          # which auditwheel cannot resolve.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            tmpdir=$(mktemp -d) &&
            unzip -q {wheel} -d $tmpdir &&
            for f in $(find $tmpdir -name '*.so'); do
              patchelf --set-rpath '$ORIGIN' $f 2>/dev/null || true;
              for lib in libggml-base libggml-cpu libggml; do
                patchelf --replace-needed "ggml/src/$lib.so" "$lib.so" $f 2>/dev/null || true;
              done;
            done &&
            (cd $tmpdir && zip -qr {wheel} .) &&
            rm -rf $tmpdir &&
            auditwheel repair -w {dest_dir} {wheel}

          # Fix install_name entries before delocate-wheel repair on macOS.
          # cmake embeds build-tree paths in dylib install_names and their
          # NEEDED references (e.g. /build/path/libggml-base.dylib),
          # which delocate-wheel cannot resolve. Rewrite them to @rpath-relative.
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            tmpdir=$(mktemp -d) &&
            unzip -q {wheel} -d $tmpdir &&
            pkg_dir=$tmpdir/rapidspeech &&
            for f in $(find $pkg_dir -name '*.dylib' -o -name '*.so'); do
              for lib in libggml-base libggml-cpu libggml-metal libggml-blas libggml librapidspeech-core; do
                install_name_tool -change "$lib.dylib" "@rpath/$lib.dylib" "$f" 2>/dev/null || true;
                install_name_tool -change "ggml/src/$lib.dylib" "@rpath/$lib.dylib" "$f" 2>/dev/null || true;
              done;
              install_name_tool -add_rpath "@loader_path" "$f" 2>/dev/null || true;
              install_name_tool -add_rpath "@loader_path/.." "$f" 2>/dev/null || true;
              id=$(otool -D "$f" | tail -1) &&
              basename_id=$(basename "$id") &&
              if [ "$id" != "$basename_id" ] && [ -n "$basename_id" ]; then
                install_name_tool -id "@rpath/$basename_id" "$f" 2>/dev/null || true;
              fi;
            done &&
            (cd $tmpdir && zip -qr {wheel} .) &&
            rm -rf $tmpdir &&
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.backend }}-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    # Trigger publishing only on actual tag pushes, not manual workflow runs
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Mandatory for OIDC (Trusted Publishers) authentication
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token needed here; authentication is handled via OIDC
