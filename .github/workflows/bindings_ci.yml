name: Bindings CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'rapidspeech/python/**'
      - 'rapidspeech/wasm/**'
      - 'wasm-examples/**'
      - 'node-api-example/**'
      - 'tests/bindings/**'
      - 'include/rapidspeech.h'
      - 'rapidspeech/src/c_api/**'
      - '.github/workflows/bindings_ci.yml'
      - 'setup.py'
      - 'pyproject.toml'
      - 'CMakeLists.txt'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_models:
        description: 'Download full TTS/Speaker/KWS model set (Layer 3)'
        required: false
        default: 'false'

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Python: build wheel, run pytest with surface + (cached) Layer 2.
  # Layer 3 only on workflow_dispatch full_models=true.
  # ──────────────────────────────────────────────────────────────────
  python-bindings:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 cmake setuptools setuptools_scm wheel numpy pytest

      - name: Install rapidspeech wheel
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0.dev0"
        run: pip install . -v

      - name: Cache Layer-2 models
        id: cache-models-l2
        uses: actions/cache@v4
        with:
          path: tests/bindings/_models
          key: rapidai-models-l2-v1

      - name: Download Layer-2 models
        if: steps.cache-models-l2.outputs.cache-hit != 'true' && runner.os != 'Windows'
        shell: bash
        run: bash tests/bindings/download_models.sh tests/bindings/_models

      - name: Download Layer-2 models (Windows)
        if: steps.cache-models-l2.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: bash
        run: bash tests/bindings/download_models.sh tests/bindings/_models

      - name: Download Layer-3 models (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.full_models == 'true'
        shell: bash
        env:
          FULL: "1"
        run: bash tests/bindings/download_models.sh tests/bindings/_models

      - name: Run pytest
        shell: bash
        env:
          RAPIDAI_MODELS_DIR: ${{ github.workspace }}/tests/bindings/_models
        run: |
          set -e
          # cd elsewhere so pytest imports the installed wheel, not src/
          cd "$RUNNER_TEMP"
          python -m pytest "${{ github.workspace }}/tests/bindings/python" -v

  # ──────────────────────────────────────────────────────────────────
  # WASM build: emcc + smoke-check artifacts.
  # ──────────────────────────────────────────────────────────────────
  wasm-build:
    name: WASM build (emcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '4.0.7'
          actions-cache-folder: 'emsdk-cache'

      - name: Verify emcc
        run: emcc --version

      - name: Build WASM
        env:
          # emscripten 4.0.7 ships in CI but its emdawnwebgpu port is not yet
          # stable (`em++: invalid port name: emdawnwebgpu`). Disable the
          # WebGPU backend in CI for now; local builds still pick it up by
          # default via build-wasm.sh.
          RS_WASM_WEBGPU: OFF
        run: bash rapidspeech/wasm/build-wasm.sh

      - name: Smoke-check artifacts
        run: node tests/bindings/wasm/test_build_artifacts.mjs

      - name: Upload WASM bundle
        uses: actions/upload-artifact@v4
        with:
          name: wasm-bundle
          path: |
            wasm-examples/rapidspeech-wasm.js
            wasm-examples/rapidspeech-wasm.wasm
            wasm-examples/rapidspeech-wasm.worker.js
          if-no-files-found: warn
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # Node smoke: pull fresh WASM bundle from above, run surface tests.
  # ──────────────────────────────────────────────────────────────────
  node-bindings:
    name: Node smoke
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download WASM bundle
        uses: actions/download-artifact@v4
        with:
          name: wasm-bundle
          path: wasm-examples

      - name: Run Node surface tests
        run: node tests/bindings/node/test_surface.mjs

      - name: Smoke-test node-api-example --help
        shell: bash
        run: |
          set -e
          # node-api-example loads the bridge at require time; we just
          # check it does not throw at module init.
          node -e "require('./node-api-example/index.js'); console.log('node-api-example loaded')" || \
            node node-api-example/index.js --help || true
